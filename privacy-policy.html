  <style>

    .footer { margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 0.98rem; }
    html[dir="rtl"] body { text-align: right; }

    const translations = {
      en:{dir:'ltr',lang:'en',pageTag:'Legal Document',languageLabel:'Language',title:'Privacy Policy',lastUpdated:'Last updated: June 17, 2026',translationNotice:'This page includes translated versions for convenience. Translations may not be perfectly accurate. In the event of any inconsistency or ambiguity, the English version should be treated as the controlling version.',intro:'This Privacy Policy explains how 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃 (“the Bot”, “we”, “us”) processes personal data when users interact with the Bot on Discord.',h1:'1. Controller',c1a:'The controller responsible for data processing related to the Bot is:',c1b:'Developer name: rxy_lsh<br />Contact email: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',h2:'2. Information We May Process',c2a:'When you use the Bot, we may process personal data and technical information necessary to provide the service.',list2:['Discord user IDs','Discord server IDs','Discord channel IDs','Usernames, display names, and messages sent to the Bot','Basic usage and technical data required for operation, security, and troubleshooting'],h3:'3. Purposes of Processing',c3a:'We process data only to the extent necessary for operating and improving the Bot.',list3:['To respond to messages and commands','To maintain short-term conversation context','To detect abuse, spam, or misuse','To monitor, secure, maintain, and improve the service'],h4:'4. Legal Bases',c4a:'Where applicable under EU/EEA data protection law, we process personal data on the basis of our legitimate interests in operating, securing, and improving the Bot, and where necessary for providing the service requested through user interaction with the Bot.',h5:'5. AI Processing and Transparency',c5a:'The Bot uses artificial intelligence to generate responses. Messages sent to the Bot may be processed by a third-party AI provider in order to create replies. By interacting with the Bot, users understand that they are communicating with an AI-supported system.',h6:'6. Storage and Retention',c6a:'Messages sent in Discord may be stored by Discord itself according to Discord’s own systems, settings, and retention practices, unless they are manually deleted by users, administrators, or removed by other bots or platform features.',c6b:'The Bot itself does not maintain a permanent independent archive of all messages. Instead, the Bot keeps only a temporary rolling context of up to 200 messages for conversational continuity and response quality.',c6c:'This temporary context is used only for the ongoing interaction and is not intended as permanent long-term storage by the Bot itself.',h7:'7. Recipients and Service Providers',c7a:'Personal data may be processed by third-party service providers where necessary to operate the Bot, including:',list7:['Anthropic, for AI processing and response generation','Railway, for hosting and infrastructure','GitHub / GitHub Pages, where relevant for hosting public project-related or legal pages'],h8:'8. EEA / EWR and International Transfers',c8a:'If you are located in the European Economic Area (EEA / EWR), please note that personal data may be processed or transferred to countries outside the EEA in connection with the use of third-party providers and technical infrastructure.',c8b:'Where such international transfers take place, we aim to rely on appropriate safeguards under applicable data protection law, such as contractual, organizational, or other legally recognized transfer mechanisms where required.',h9:'9. Data Subject Rights',c9a:'If you are in the EU/EEA or otherwise have applicable rights under data protection law, you may have the right to request access, rectification, deletion, restriction of processing, objection to processing, and, where applicable, data portability.',c9b:'You may also have the right to lodge a complaint with a competent data protection authority.',h10:'10. Necessity of Providing Data',c10a:'Providing message content and related Discord account data is necessary for the Bot to respond. If such data is not provided, the Bot may not be able to function as intended for that interaction.',h11:'11. Security',c11a:'We take reasonable steps to protect the data processed through the Bot. However, no method of transmission, storage, or processing can be guaranteed to be completely secure.',h12:'12. Changes to This Policy',c12a:'We may update this Privacy Policy from time to time. Any updated version will be posted on this page with a revised “Last updated” date.',h13:'13. Contact',c13a:'Developer: rxy_lsh<br />Email: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',footerText:'Privacy Policy for 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃'},
      de:{dir:'ltr',lang:'de',pageTag:'Rechtsdokument',languageLabel:'Sprache',title:'Datenschutzerklärung',lastUpdated:'Zuletzt aktualisiert: 17. Juni 2026',translationNotice:'Diese Seite enthält Übersetzungen zur besseren Verständlichkeit. Übersetzungen sind möglicherweise nicht vollständig korrekt. Bei Widersprüchen oder Unklarheiten gilt die englische Fassung als maßgebliche Version.',intro:'Diese Datenschutzerklärung erläutert, wie 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃 („der Bot“, „wir“, „uns“) personenbezogene Daten verarbeitet, wenn Nutzer mit dem Bot auf Discord interagieren.',h1:'1. Verantwortlicher',c1a:'Verantwortlich für die mit dem Bot verbundene Datenverarbeitung ist:',c1b:'Entwicklername: rxy_lsh<br />Kontakt-E-Mail: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',h2:'2. Welche Daten wir verarbeiten können',c2a:'Wenn Sie den Bot nutzen, können wir personenbezogene Daten und technische Informationen verarbeiten, die zur Bereitstellung des Dienstes erforderlich sind.',list2:['Discord-Benutzer-IDs','Discord-Server-IDs','Discord-Kanal-IDs','Benutzernamen, Anzeigenamen und an den Bot gesendete Nachrichten','Grundlegende Nutzungs- und technische Daten für Betrieb, Sicherheit und Fehlerbehebung'],h3:'3. Zwecke der Verarbeitung',c3a:'Wir verarbeiten Daten nur, soweit dies für den Betrieb und die Verbesserung des Bots erforderlich ist.',list3:['Zur Beantwortung von Nachrichten und Befehlen','Zur Aufrechterhaltung eines kurzfristigen Gesprächskontexts','Zur Erkennung von Missbrauch, Spam oder Fehlverhalten','Zur Überwachung, Sicherung, Wartung und Verbesserung des Dienstes'],h4:'4. Rechtsgrundlagen',c4a:'Soweit nach EU-/EWR-Datenschutzrecht anwendbar, verarbeiten wir personenbezogene Daten auf Grundlage unserer berechtigten Interessen am Betrieb, an der Sicherung und Verbesserung des Bots sowie, soweit erforderlich, zur Bereitstellung des durch die Interaktion mit dem Bot angeforderten Dienstes.',h5:'5. KI-Verarbeitung und Transparenz',c5a:'Der Bot verwendet künstliche Intelligenz zur Generierung von Antworten. An den Bot gesendete Nachrichten können von einem Drittanbieter für KI verarbeitet werden, um Antworten zu erstellen. Durch die Interaktion mit dem Bot verstehen Nutzer, dass sie mit einem KI-gestützten System kommunizieren.',h6:'6. Speicherung und Aufbewahrung',c6a:'Nachrichten, die in Discord gesendet werden, können von Discord selbst gemäß den eigenen Systemen, Einstellungen und Aufbewahrungspraktiken von Discord gespeichert werden, sofern sie nicht manuell von Nutzern oder Administratoren gelöscht oder durch andere Bots oder Plattformfunktionen entfernt werden.',c6b:'Der Bot selbst führt kein dauerhaftes unabhängiges Archiv aller Nachrichten. Stattdessen speichert der Bot nur einen temporären rollierenden Kontext von bis zu 200 Nachrichten, um Gesprächskontinuität und Antwortqualität zu verbessern.',c6c:'Dieser temporäre Kontext wird nur für die laufende Interaktion verwendet und ist nicht als dauerhafte Langzeitspeicherung durch den Bot vorgesehen.',h7:'7. Empfänger und Dienstleister',c7a:'Personenbezogene Daten können, soweit für den Betrieb des Bots erforderlich, von Drittanbietern verarbeitet werden, darunter:',list7:['Anthropic, für KI-Verarbeitung und Antwortgenerierung','Railway, für Hosting und Infrastruktur','GitHub / GitHub Pages, soweit relevant für das Hosting öffentlicher projektbezogener oder rechtlicher Seiten'],h8:'8. EWR und internationale Datenübermittlungen',c8a:'Wenn Sie sich im Europäischen Wirtschaftsraum (EWR) befinden, beachten Sie bitte, dass personenbezogene Daten im Zusammenhang mit der Nutzung von Drittanbietern und technischer Infrastruktur auch außerhalb des EWR verarbeitet oder in Länder außerhalb des EWR übermittelt werden können.',c8b:'Soweit solche internationalen Datenübermittlungen stattfinden, bemühen wir uns, angemessene Schutzmaßnahmen nach geltendem Datenschutzrecht zu nutzen, etwa vertragliche, organisatorische oder andere gesetzlich anerkannte Übermittlungsmechanismen, soweit erforderlich.',h9:'9. Rechte betroffener Personen',c9a:'Wenn Sie sich in der EU/im EWR befinden oder anderweitig anwendbare Datenschutzrechte haben, können Sie das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Widerspruch gegen die Verarbeitung und gegebenenfalls Datenübertragbarkeit haben.',c9b:'Sie können außerdem das Recht haben, bei einer zuständigen Datenschutzaufsichtsbehörde Beschwerde einzulegen.',h10:'10. Erforderlichkeit der Datenbereitstellung',c10a:'Die Bereitstellung von Nachrichteninhalten und zugehörigen Discord-Kontodaten ist erforderlich, damit der Bot antworten kann. Werden diese Daten nicht bereitgestellt, kann der Bot für diese Interaktion möglicherweise nicht wie vorgesehen funktionieren.',h11:'11. Sicherheit',c11a:'Wir ergreifen angemessene Maßnahmen zum Schutz der durch den Bot verarbeiteten Daten. Dennoch kann keine Übertragungs-, Speicher- oder Verarbeitungsmethode vollständig sicher garantiert werden.',h12:'12. Änderungen dieser Erklärung',c12a:'Wir können diese Datenschutzerklärung von Zeit zu Zeit aktualisieren. Jede aktualisierte Fassung wird auf dieser Seite mit einem geänderten Datum der letzten Aktualisierung veröffentlicht.',h13:'13. Kontakt',c13a:'Entwickler: rxy_lsh<br />E-Mail: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',footerText:'Datenschutzerklärung für 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃'},
      fr:{dir:'ltr',lang:'fr',pageTag:'Document juridique',languageLabel:'Langue',title:'Politique de confidentialité',lastUpdated:'Dernière mise à jour : 17 juin 2026',translationNotice:'Cette page comprend des traductions à titre de commodité. Les traductions peuvent ne pas être parfaitement exactes. En cas d’incohérence ou d’ambiguïté, la version anglaise doit être considérée comme la version de référence.',intro:'La présente Politique de confidentialité explique comment 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃 (« le Bot », « nous », « notre ») traite les données personnelles lorsque les utilisateurs interagissent avec le Bot sur Discord.',h1:'1. Responsable du traitement',c1a:'Le responsable du traitement des données liées au Bot est :',c1b:'Nom du développeur : rxy_lsh<br />E-mail de contact : <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',h2:'2. Informations que nous pouvons traiter',c2a:'Lorsque vous utilisez le Bot, nous pouvons traiter des données personnelles et des informations techniques nécessaires à la fourniture du service.',list2:['Identifiants utilisateur Discord','Identifiants de serveur Discord','Identifiants de canal Discord','Noms d’utilisateur, noms d’affichage et messages envoyés au Bot','Données d’utilisation et techniques de base nécessaires au fonctionnement, à la sécurité et au dépannage'],h3:'3. Finalités du traitement',c3a:'Nous traitons les données uniquement dans la mesure nécessaire au fonctionnement et à l’amélioration du Bot.',list3:['Répondre aux messages et aux commandes','Maintenir un contexte conversationnel à court terme','Détecter les abus, le spam ou les usages inappropriés','Surveiller, sécuriser, maintenir et améliorer le service'],h4:'4. Bases légales',c4a:'Lorsque le droit de la protection des données de l’UE/EEE s’applique, nous traitons les données personnelles sur la base de nos intérêts légitimes à exploiter, sécuriser et améliorer le Bot et, si nécessaire, pour fournir le service demandé par l’interaction de l’utilisateur avec le Bot.',h5:'5. Traitement par IA et transparence',c5a:'Le Bot utilise l’intelligence artificielle pour générer des réponses. Les messages envoyés au Bot peuvent être traités par un fournisseur tiers d’IA afin de créer des réponses. En interagissant avec le Bot, les utilisateurs comprennent qu’ils communiquent avec un système assisté par IA.',h6:'6. Stockage et conservation',c6a:'Les messages envoyés dans Discord peuvent être stockés par Discord lui-même selon ses propres systèmes, paramètres et pratiques de conservation, sauf s’ils sont supprimés manuellement par les utilisateurs ou administrateurs, ou retirés par d’autres bots ou fonctionnalités de la plateforme.',c6b:'Le Bot lui-même ne conserve pas d’archive permanente et indépendante de tous les messages. À la place, le Bot ne conserve qu’un contexte temporaire glissant pouvant aller jusqu’à 200 messages afin d’assurer la continuité de la conversation et la qualité des réponses.',c6c:'Ce contexte temporaire est utilisé uniquement pour l’interaction en cours et n’est pas destiné à constituer un stockage permanent à long terme par le Bot lui-même.',h7:'7. Destinataires et prestataires de services',c7a:'Les données personnelles peuvent être traitées par des prestataires tiers lorsque cela est nécessaire au fonctionnement du Bot, notamment :',list7:['Anthropic, pour le traitement IA et la génération de réponses','Railway, pour l’hébergement et l’infrastructure','GitHub / GitHub Pages, le cas échéant, pour l’hébergement de pages publiques liées au projet ou à des informations juridiques'],h8:'8. EEE / EWR et transferts internationaux',c8a:'Si vous êtes situé dans l’Espace économique européen (EEE / EWR), veuillez noter que des données personnelles peuvent être traitées ou transférées vers des pays situés en dehors de l’EEE dans le cadre de l’utilisation de prestataires tiers et d’infrastructures techniques.',c8b:'Lorsque de tels transferts internationaux ont lieu, nous cherchons à nous appuyer sur des garanties appropriées conformément au droit applicable en matière de protection des données, telles que des mécanismes contractuels, organisationnels ou d’autres mécanismes légalement reconnus, lorsque cela est requis.',h9:'9. Droits des personnes concernées',c9a:'Si vous vous trouvez dans l’UE/l’EEE ou si vous bénéficiez d’autres droits applicables en matière de protection des données, vous pouvez avoir le droit de demander l’accès, la rectification, l’effacement, la limitation du traitement, l’opposition au traitement et, le cas échéant, la portabilité des données.',c9b:'Vous pouvez également avoir le droit d’introduire une réclamation auprès d’une autorité compétente de protection des données.',h10:'10. Nécessité de fournir des données',c10a:'La fourniture du contenu des messages et des données de compte Discord associées est nécessaire pour que le Bot puisse répondre. Si ces données ne sont pas fournies, le Bot peut ne pas être en mesure de fonctionner comme prévu pour cette interaction.',h11:'11. Sécurité',c11a:'Nous prenons des mesures raisonnables pour protéger les données traitées via le Bot. Toutefois, aucune méthode de transmission, de stockage ou de traitement ne peut être garantie comme totalement sécurisée.',h12:'12. Modifications de cette politique',c12a:'Nous pouvons mettre à jour cette Politique de confidentialité de temps à autre. Toute version mise à jour sera publiée sur cette page avec une date de « dernière mise à jour » révisée.',h13:'13. Contact',c13a:'Développeur : rxy_lsh<br />E-mail : <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',footerText:'Politique de confidentialité pour 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃'},
      es:{dir:'ltr',lang:'es',pageTag:'Documento legal',languageLabel:'Idioma',title:'Política de privacidad',lastUpdated:'Última actualización: 17 de junio de 2026',translationNotice:'Esta página incluye traducciones por conveniencia. Es posible que las traducciones no sean completamente precisas. En caso de inconsistencia o ambigüedad, la versión en inglés debe considerarse la versión de referencia.',intro:'Esta Política de Privacidad explica cómo 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃 (“el Bot”, “nosotros”) procesa datos personales cuando los usuarios interactúan con el Bot en Discord.',h1:'1. Responsable del tratamiento',c1a:'El responsable del tratamiento de datos relacionado con el Bot es:',c1b:'Nombre del desarrollador: rxy_lsh<br />Correo de contacto: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',h2:'2. Información que podemos procesar',c2a:'Cuando utilizas el Bot, podemos procesar datos personales e información técnica necesaria para prestar el servicio.',list2:['IDs de usuario de Discord','IDs de servidor de Discord','IDs de canal de Discord','Nombres de usuario, nombres visibles y mensajes enviados al Bot','Datos básicos de uso y técnicos necesarios para el funcionamiento, la seguridad y la resolución de problemas'],h3:'3. Finalidades del tratamiento',c3a:'Procesamos datos solo en la medida necesaria para operar y mejorar el Bot.',list3:['Responder a mensajes y comandos','Mantener contexto conversacional a corto plazo','Detectar abuso, spam o uso indebido','Supervisar, proteger, mantener y mejorar el servicio'],h4:'4. Bases jurídicas',c4a:'Cuando corresponda conforme a la legislación de protección de datos de la UE/EEE, procesamos datos personales sobre la base de nuestros intereses legítimos en operar, proteger y mejorar el Bot y, cuando sea necesario, para prestar el servicio solicitado mediante la interacción del usuario con el Bot.',h5:'5. Procesamiento con IA y transparencia',c5a:'El Bot utiliza inteligencia artificial para generar respuestas. Los mensajes enviados al Bot pueden ser procesados por un proveedor externo de IA para crear respuestas. Al interactuar con el Bot, los usuarios entienden que están comunicándose con un sistema asistido por IA.',h6:'6. Almacenamiento y conservación',c6a:'Los mensajes enviados en Discord pueden ser almacenados por el propio Discord de acuerdo con sus propios sistemas, configuraciones y prácticas de conservación, salvo que sean eliminados manualmente por usuarios o administradores, o retirados por otros bots o funciones de la plataforma.',c6b:'El Bot no mantiene un archivo permanente e independiente de todos los mensajes. En su lugar, el Bot conserva solo un contexto temporal y rotativo de hasta 200 mensajes para la continuidad conversacional y la calidad de las respuestas.',c6c:'Este contexto temporal se utiliza únicamente para la interacción en curso y no está destinado a un almacenamiento permanente a largo plazo por parte del propio Bot.',h7:'7. Destinatarios y proveedores de servicios',c7a:'Los datos personales pueden ser procesados por proveedores externos cuando sea necesario para operar el Bot, incluidos:',list7:['Anthropic, para procesamiento de IA y generación de respuestas','Railway, para alojamiento e infraestructura','GitHub / GitHub Pages, cuando sea relevante para alojar páginas públicas relacionadas con el proyecto o documentos legales'],h8:'8. EEE / EWR y transferencias internacionales',c8a:'Si te encuentras en el Espacio Económico Europeo (EEE / EWR), ten en cuenta que los datos personales pueden procesarse o transferirse a países fuera del EEE en relación con el uso de proveedores externos e infraestructura técnica.',c8b:'Cuando se produzcan estas transferencias internacionales, procuramos basarnos en garantías adecuadas conforme a la legislación aplicable en materia de protección de datos, como mecanismos contractuales, organizativos u otros mecanismos de transferencia legalmente reconocidos cuando sea necesario.',h9:'9. Derechos de los interesados',c9a:'Si te encuentras en la UE/EEE o dispones de derechos aplicables conforme a la legislación de protección de datos, puedes tener derecho a solicitar acceso, rectificación, supresión, limitación del tratamiento, oposición al tratamiento y, cuando corresponda, portabilidad de los datos.',c9b:'También puedes tener derecho a presentar una reclamación ante una autoridad competente de protección de datos.',h10:'10. Necesidad de proporcionar datos',c10a:'Proporcionar el contenido de los mensajes y los datos relacionados de la cuenta de Discord es necesario para que el Bot pueda responder. Si dichos datos no se facilitan, es posible que el Bot no pueda funcionar como se espera en esa interacción.',h11:'11. Seguridad',c11a:'Adoptamos medidas razonables para proteger los datos tratados a través del Bot. Sin embargo, ningún método de transmisión, almacenamiento o procesamiento puede garantizarse como completamente seguro.',h12:'12. Cambios en esta política',c12a:'Podemos actualizar esta Política de Privacidad ocasionalmente. Cualquier versión actualizada se publicará en esta página con una fecha revisada de “última actualización”.',h13:'13. Contacto',c13a:'Desarrollador: rxy_lsh<br />Correo electrónico: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',footerText:'Política de privacidad de 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃'},
      ar:{dir:'rtl',lang:'ar',pageTag:'مستند قانوني',languageLabel:'اللغة',title:'سياسة الخصوصية',lastUpdated:'آخر تحديث: 17 يونيو 2026',translationNotice:'تتضمن هذه الصفحة ترجمات لراحة المستخدم. قد لا تكون الترجمات دقيقة بشكل كامل. في حال وجود أي تعارض أو غموض، يجب اعتبار النسخة الإنجليزية هي النسخة المعتمدة.',intro:'توضح سياسة الخصوصية هذه كيف يقوم 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃 ("البوت" أو "نحن") بمعالجة البيانات الشخصية عند تفاعل المستخدمين مع البوت على ديسكورد.',h1:'1. المسؤول عن المعالجة',c1a:'الجهة المسؤولة عن معالجة البيانات المتعلقة بالبوت هي:',c1b:'اسم المطور: rxy_lsh<br />البريد الإلكتروني للتواصل: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',h2:'2. المعلومات التي قد نقوم بمعالجتها',c2a:'عند استخدامك للبوت، قد نقوم بمعالجة بيانات شخصية ومعلومات تقنية ضرورية لتقديم الخدمة.',list2:['معرّفات مستخدمي ديسكورد','معرّفات خوادم ديسكورد','معرّفات قنوات ديسكورد','أسماء المستخدمين والأسماء الظاهرة والرسائل المرسلة إلى البوت','بيانات استخدام وتقنية أساسية مطلوبة للتشغيل والأمان واستكشاف الأخطاء وإصلاحها'],h3:'3. أغراض المعالجة',c3a:'نحن نعالج البيانات فقط بالقدر اللازم لتشغيل البوت وتحسينه.',list3:['للرد على الرسائل والأوامر','للحفاظ على سياق محادثة قصير المدى','لاكتشاف إساءة الاستخدام أو الرسائل المزعجة أو سوء الاستعمال','لمراقبة الخدمة وتأمينها وصيانتها وتحسينها'],h4:'4. الأسس القانونية',c4a:'عند انطباق قوانين حماية البيانات في الاتحاد الأوروبي/المنطقة الاقتصادية الأوروبية، نقوم بمعالجة البيانات الشخصية استنادًا إلى مصالحنا المشروعة في تشغيل البوت وتأمينه وتحسينه، وعند الحاجة لتقديم الخدمة المطلوبة من خلال تفاعل المستخدم مع البوت.',h5:'5. المعالجة بالذكاء الاصطناعي والشفافية',c5a:'يستخدم البوت الذكاء الاصطناعي لإنشاء الردود. قد تتم معالجة الرسائل المرسلة إلى البوت بواسطة مزود خارجي للذكاء الاصطناعي من أجل إنشاء الردود. ومن خلال التفاعل مع البوت، يدرك المستخدمون أنهم يتواصلون مع نظام مدعوم بالذكاء الاصطناعي.',h6:'6. التخزين والاحتفاظ بالبيانات',c6a:'قد يتم تخزين الرسائل المرسلة في ديسكورد بواسطة ديسكورد نفسه وفقًا لأنظمته وإعداداته وممارسات الاحتفاظ الخاصة به، ما لم يتم حذفها يدويًا من قبل المستخدمين أو المشرفين أو إزالتها بواسطة بوتات أخرى أو ميزات المنصة.',c6b:'لا يحتفظ البوت نفسه بأرشيف دائم ومستقل لجميع الرسائل. وبدلاً من ذلك، يحتفظ فقط بسياق مؤقت متجدد يصل إلى 200 رسالة لضمان استمرارية المحادثة وجودة الردود.',c6c:'يُستخدم هذا السياق المؤقت فقط أثناء التفاعل الجاري، وليس المقصود به أن يكون تخزينًا دائمًا طويل الأمد من جانب البوت نفسه.',h7:'7. الجهات المستلمة ومقدمو الخدمة',c7a:'قد تتم معالجة البيانات الشخصية بواسطة مزودي خدمات من جهات خارجية عند الحاجة لتشغيل البوت، بما في ذلك:',list7:['Anthropic، لمعالجة الذكاء الاصطناعي وإنشاء الردود','Railway، للاستضافة والبنية التحتية','GitHub / GitHub Pages، عند الاقتضاء لاستضافة صفحات عامة متعلقة بالمشروع أو الصفحات القانونية'],h8:'8. المنطقة الاقتصادية الأوروبية والتحويلات الدولية',c8a:'إذا كنت موجودًا في المنطقة الاقتصادية الأوروبية (EEA / EWR)، يرجى ملاحظة أن البيانات الشخصية قد تتم معالجتها أو نقلها إلى دول خارج المنطقة الاقتصادية الأوروبية فيما يتعلق باستخدام مزودي الخدمات الخارجيين والبنية التحتية التقنية.',c8b:'وعند حدوث مثل هذه التحويلات الدولية، نسعى إلى الاعتماد على ضمانات مناسبة وفقًا لقانون حماية البيانات المعمول به، مثل الآليات التعاقدية أو التنظيمية أو غيرها من آليات النقل المعترف بها قانونًا عند الاقتضاء.',h9:'9. حقوق أصحاب البيانات',c9a:'إذا كنت داخل الاتحاد الأوروبي/المنطقة الاقتصادية الأوروبية أو كانت لديك حقوق سارية بموجب قانون حماية البيانات، فقد يكون لديك الحق في طلب الوصول إلى البيانات أو تصحيحها أو حذفها أو تقييد معالجتها أو الاعتراض على معالجتها، وعند الاقتضاء، نقل البيانات.',c9b:'وقد يكون لديك أيضًا الحق في تقديم شكوى إلى سلطة مختصة بحماية البيانات.',h10:'10. ضرورة تقديم البيانات',c10a:'يعد تقديم محتوى الرسائل وبيانات حساب ديسكورد المرتبطة ضروريًا لكي يتمكن البوت من الرد. وإذا لم يتم تقديم هذه البيانات، فقد لا يتمكن البوت من العمل كما هو مقصود في ذلك التفاعل.',h11:'11. الأمان',c11a:'نتخذ خطوات معقولة لحماية البيانات التي تتم معالجتها من خلال البوت. ومع ذلك، لا يمكن ضمان أن أي وسيلة نقل أو تخزين أو معالجة آمنة بشكل كامل.',h12:'12. التغييرات على هذه السياسة',c12a:'قد نقوم بتحديث سياسة الخصوصية هذه من وقت لآخر. وسيتم نشر أي نسخة محدثة على هذه الصفحة مع تاريخ "آخر تحديث" المعدل.',h13:'13. التواصل',c13a:'المطور: rxy_lsh<br />البريد الإلكتروني: <a href="mailto:Bpascal396@gmail.com">Bpascal396@gmail.com</a>',footerText:'سياسة الخصوصية الخاصة بـ 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃'}
    };
    const fields=['pageTag','languageLabel','title','lastUpdated','translationNotice','intro','h1','c1a','c1b','h2','c2a','h3','c3a','h4','c4a','h5','c5a','h6','c6a','c6b','c6c','h7','c7a','h8','c8a','c8b','h9','c9a','c9b','h10','c10a','h11','c11a','h12','c12a','h13','c13a','footerText'];
    function renderList(id,items){const ul=document.getElementById(id);ul.innerHTML='';items.forEach(item=>{const li=document.createElement('li');li.textContent=item;ul.appendChild(li);});}
    function setLanguage(lang){const t=translations[lang]||translations.en;document.documentElement.lang=t.lang;document.documentElement.dir=t.dir||'ltr';fields.forEach(id=>{const el=document.getElementById(id);if(el) el.innerHTML=t[id];});renderList('list2',t.list2);renderList('list3',t.list3);renderList('list7',t.list7);document.title=`${t.title} | 𐌋𐌀𐌐𐌐𐌋𐌀𐌍𐌃`;}
    const languageSelect=document.getElementById('languageSelect');languageSelect.addEventListener('change',e=>setLanguage(e.target.value));
    const browserLang=(navigator.language||'en').slice(0,2).toLowerCase();const supported=['en','de','fr','es','ar'];const initialLang=supported.includes(browserLang)?browserLang:'en';languageSelect.value=initialLang;setLanguage(initialLang);
