    :root {
      --bg: #111111;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.12);
      --text: #f5f5f2;
      --heading: #fff8f6;
      --muted: #b9b8b2;
      --accent: #c63a3a;
      --accent-soft: rgba(198,58,58,0.14);
      --accent-border: rgba(198,58,58,0.25);
      --notice-bg: rgba(255,255,255,0.05);
      --notice-border: rgba(255,255,255,0.10);
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(198,58,58,0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(143,31,31,0.18), transparent 30%),

      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.75;
      font-size: 1rem;
    }

    .wrap {
      max-width: 1040px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.04));
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      backdrop-filter: blur(14px);
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ffd6d6;
      text-decoration: none;
      font-weight: 600;
      transition: background 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .back-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(198,58,58,0.45);
      transform: translateY(-2px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      display: inline-block;
      width: fit-content;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      color: #ffd6d6;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .language-box {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 220px;
    }

    .language-box label {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 700;
    }

    select {
      appearance: none;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 600;
      outline: none;
    }

    select:focus {
      border-color: rgba(198,58,58,0.45);
      box-shadow: 0 0 0 4px rgba(198,58,58,0.12);
    }

    h1, h2 {
      color: var(--heading);
      line-height: 1.2;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.6rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
    }

    .notice {
      margin: 0 0 28px;
      padding: 16px 18px;
      border: 1px solid var(--notice-border);
      background: var(--notice-bg);
      border-radius: 16px;
      color: #d7d5cf;
      font-size: 0.97rem;
    }

    h2 {
      margin-top: 34px;
      margin-bottom: 12px;
      font-size: 1.22rem;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    p, li {
      max-width: 76ch;
      color: var(--text);
    }

    ul {
      padding-left: 22px;
    }

    li::marker {
      color: #ffb0b0;
    }

    a {
      color: #ffb0b0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #8d8c87;
      font-size: 0.96rem;
    }

    html[dir="rtl"] body {
      text-align: right;
    }

    html[dir="rtl"] .topbar {
      flex-direction: row-reverse;
    }

    html[dir="rtl"] .brand {
      align-items: flex-end;
    }

    html[dir="rtl"] .language-box {
      align-items: stretch;
    }

    html[dir="rtl"] ul {
      padding-left: 0;
      padding-right: 22px;
    }

    @media (max-width: 640px) {
      .wrap {
        margin: 24px auto;
      }

      .card {
        padding: 24px 20px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.9rem;
      }

      .language-box {
        min-width: 100%;
      }
    }
  </style>
</head>

    const ids = [
      'backLink','pageTag','languageLabel','title','lastUpdated','translationNotice','intro',
      'h1','c1a','h2','c2a','h3','c3a','h4','c4a','h5','c5a','h6','c6a','h7','c7a',
      'h8','c8a','h9','c9a','h10','c10a','h11','c11a','footerText'
    ];

    function fillList(id, items) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        el.appendChild(li);
      });
    }

    function updateBackLink(lang) {
      document.getElementById('backLink').href = `./index.html?lang=${encodeURIComponent(lang)}`;
    }

    function applyLanguage(lang) {
      const t = translations[lang] || translations.en;

      document.documentElement.lang = lang;
      document.documentElement.dir = t.dir || 'ltr';

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (!el || !(id in t)) return;
        el.textContent = t[id];
      });

      fillList('list4', t.list4);
      updateBackLink(lang);

      const select = document.getElementById('languageSelect');
      if (select.value !== lang) select.value = lang;
    }

    document.getElementById('languageSelect').addEventListener('change', (event) => {
      const lang = event.target.value;
      const url = new URL(window.location.href);
      url.searchParams.set('lang', lang);
      window.history.replaceState({}, '', url);
      applyLanguage(lang);
    });

    const params = new URLSearchParams(window.location.search);
    const initialLang = params.get('lang');
    const startLang = translations[initialLang] ? initialLang : 'en';

    applyLanguage(startLang);
  </script>
